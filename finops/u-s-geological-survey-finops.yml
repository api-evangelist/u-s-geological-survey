meters:
  - name: api_requests
    description: Count of requests to USGS web services (no monetary charge from USGS)
    unit: request
    aggregation: sum
    dimensions:
      - service
      - endpoint
  - name: bulk_download_volume
    description: Volume of catalog / feed bulk downloads
    unit: GB
    aggregation: sum
    dimensions:
      - service
principles:
  - name: Visibility
    description: Track consumption inside your own application logs; USGS does not provide a per-consumer
      usage dashboard.
  - name: Allocation
    description: USGS access is free, so allocation is for capacity-planning rather than chargeback —
      tag downstream compute and egress that result from USGS calls.
  - name: Optimization
    description: Cache stable catalog records, prefer the recommended GeoJSON / ATOM feeds over repeated
      ad-hoc queries, and batch via the documented Python download scripts.
  - name: Accountability
    description: Application owners are responsible for being courteous federal-data citizens — avoiding
      polling storms that could trigger network-edge throttling.
