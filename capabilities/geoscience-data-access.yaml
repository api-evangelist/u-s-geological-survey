naftiko: 1.0.0-alpha2
info:
  label: USGS Geoscience Data Access
  description: Workflow capability for geoscientists, emergency managers, hydrologists, and researchers to access USGS real-time
    earthquake data and water monitoring data. Combines the USGS Earthquake API and USGS Water Data API into a unified geoscience
    data service for hazard assessment, hydrology analysis, and natural resource monitoring.
  tags:
  - USGS
  - Geoscience
  - Earthquake
  - Water
  - Hydrology
  - Hazard Assessment
  - Federal Government
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    USGS_WATER_API_KEY: USGS_WATER_API_KEY
capability:
  consumes:
  - type: http
    namespace: usgs-earthquake
    baseUri: https://earthquake.usgs.gov/fdsnws/event/1
    description: USGS FDSN earthquake event web service.
    resources:
    - name: earthquake-events
      path: /query
      description: Query earthquake events from the USGS ComCat catalog.
      operations:
      - name: query-earthquakes
        method: GET
        description: Search earthquake events by time, location, magnitude, and depth.
        inputParameters:
        - name: format
          in: query
          type: string
          required: false
          description: Response format (geojson, csv, kml, quakeml).
        - name: starttime
          in: query
          type: string
          required: false
          description: Start time in ISO8601 format.
        - name: endtime
          in: query
          type: string
          required: false
          description: End time in ISO8601 format.
        - name: minmagnitude
          in: query
          type: number
          required: false
          description: Minimum earthquake magnitude.
        - name: maxmagnitude
          in: query
          type: number
          required: false
          description: Maximum earthquake magnitude.
        - name: minlatitude
          in: query
          type: number
          required: false
          description: Minimum latitude for bounding box.
        - name: maxlatitude
          in: query
          type: number
          required: false
          description: Maximum latitude for bounding box.
        - name: minlongitude
          in: query
          type: number
          required: false
          description: Minimum longitude for bounding box.
        - name: maxlongitude
          in: query
          type: number
          required: false
          description: Maximum longitude for bounding box.
        - name: latitude
          in: query
          type: number
          required: false
          description: Center latitude for circle filter.
        - name: longitude
          in: query
          type: number
          required: false
          description: Center longitude for circle filter.
        - name: maxradiuskm
          in: query
          type: number
          required: false
          description: Search radius in kilometers.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of events (1-20000).
        - name: orderby
          in: query
          type: string
          required: false
          description: Sort order (time, magnitude, etc.).
        - name: alertlevel
          in: query
          type: string
          required: false
          description: PAGER alert level filter.
        - name: reviewstatus
          in: query
          type: string
          required: false
          description: Filter by review status.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: count-earthquakes
        method: GET
        description: Count earthquake events matching query parameters.
        inputParameters:
        - name: starttime
          in: query
          type: string
          required: false
          description: Start time in ISO8601 format.
        - name: endtime
          in: query
          type: string
          required: false
          description: End time in ISO8601 format.
        - name: minmagnitude
          in: query
          type: number
          required: false
          description: Minimum magnitude.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: earthquake-catalogs
      path: /catalogs
      description: List available earthquake catalog sources.
      operations:
      - name: list-catalogs
        method: GET
        description: Return available earthquake catalog identifiers.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: usgs-water
    baseUri: https://api.waterdata.usgs.gov/ogcapi/v0
    description: USGS Water Data OGC API for water monitoring data.
    authentication:
      type: apikey
      key: api_key
      value: '{{USGS_WATER_API_KEY}}'
      placement: query
    resources:
    - name: monitoring-locations
      path: /collections/monitoring-locations/items
      description: USGS water monitoring locations (gages, wells, springs).
      operations:
      - name: get-monitoring-locations
        method: GET
        description: Retrieve water monitoring locations with optional spatial and attribute filters.
        inputParameters:
        - name: bbox
          in: query
          type: string
          required: false
          description: Bounding box as min_lon,min_lat,max_lon,max_lat.
        - name: stateCd
          in: query
          type: string
          required: false
          description: Two-letter state FIPS code.
        - name: huc
          in: query
          type: string
          required: false
          description: Hydrologic Unit Code.
        - name: siteType
          in: query
          type: string
          required: false
          description: USGS site type code (ST, GW, LK, etc.).
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of results.
        - name: offset
          in: query
          type: integer
          required: false
          description: Starting offset for pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: monitoring-location
      path: /collections/monitoring-locations/items/{featureId}
      description: Get a single USGS monitoring location by ID.
      operations:
      - name: get-monitoring-location
        method: GET
        description: Retrieve a single monitoring location by its USGS site identifier.
        inputParameters:
        - name: featureId
          in: path
          type: string
          required: true
          description: Monitoring location identifier (e.g., USGS-11169025).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: time-series
      path: /collections/time-series/items
      description: USGS continuous and daily water data time series.
      operations:
      - name: get-time-series
        method: GET
        description: Retrieve water data time series observations.
        inputParameters:
        - name: monitoringLocationIdentifier
          in: query
          type: string
          required: false
          description: Filter by monitoring location identifier.
        - name: observedPropertyId
          in: query
          type: string
          required: false
          description: USGS parameter code (e.g., 00060 for streamflow).
        - name: time
          in: query
          type: string
          required: false
          description: Temporal filter as ISO 8601 datetime or interval.
        - name: bbox
          in: query
          type: string
          required: false
          description: Spatial bounding box filter.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of observations.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: geoscience-data-api
    description: Unified REST API for USGS geoscience data including earthquakes and water.
    resources:
    - path: /v1/earthquakes
      name: earthquakes
      description: Search USGS earthquake catalog data.
      operations:
      - method: GET
        name: query-earthquakes
        description: Retrieve earthquake events from the USGS ComCat catalog.
        call: usgs-earthquake.query-earthquakes
        with:
          starttime: rest.starttime
          endtime: rest.endtime
          minmagnitude: rest.minmagnitude
          maxmagnitude: rest.maxmagnitude
          minlatitude: rest.minlatitude
          maxlatitude: rest.maxlatitude
          minlongitude: rest.minlongitude
          maxlongitude: rest.maxlongitude
          limit: rest.limit
          alertlevel: rest.alertlevel
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/earthquakes/count
      name: earthquake-count
      description: Count earthquake events without returning full data.
      operations:
      - method: GET
        name: count-earthquakes
        description: Return the number of earthquakes matching query parameters.
        call: usgs-earthquake.count-earthquakes
        with:
          starttime: rest.starttime
          endtime: rest.endtime
          minmagnitude: rest.minmagnitude
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/monitoring-locations
      name: monitoring-locations
      description: USGS water monitoring stations (stream gages, groundwater wells).
      operations:
      - method: GET
        name: get-monitoring-locations
        description: Find USGS water monitoring locations by state or bounding box.
        call: usgs-water.get-monitoring-locations
        with:
          bbox: rest.bbox
          stateCd: rest.stateCd
          huc: rest.huc
          siteType: rest.siteType
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/monitoring-locations/{featureId}
      name: monitoring-location
      description: Get a single USGS water monitoring location.
      operations:
      - method: GET
        name: get-monitoring-location
        description: Retrieve a specific USGS monitoring location by identifier.
        call: usgs-water.get-monitoring-location
        with:
          featureId: rest.featureId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/water-observations
      name: water-observations
      description: Time series water data from USGS monitoring locations.
      operations:
      - method: GET
        name: get-water-observations
        description: Retrieve streamflow, stage, or other water quality time series.
        call: usgs-water.get-time-series
        with:
          monitoringLocationIdentifier: rest.locationId
          observedPropertyId: rest.parameterId
          time: rest.time
          bbox: rest.bbox
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: geoscience-data-mcp
    transport: http
    description: MCP server for AI-assisted geoscience data analysis using USGS earthquake and water APIs.
    tools:
    - name: search-recent-earthquakes
      description: Search the USGS earthquake catalog for recent seismic events. Filter by time range, location (bounding
        box or circle), magnitude, depth, and alert level. Returns GeoJSON with event properties and geometry.
      hints:
        readOnly: true
        openWorld: true
      call: usgs-earthquake.query-earthquakes
      with:
        starttime: tools.start_time
        endtime: tools.end_time
        minmagnitude: tools.min_magnitude
        maxmagnitude: tools.max_magnitude
        minlatitude: tools.min_lat
        maxlatitude: tools.max_lat
        minlongitude: tools.min_lon
        maxlongitude: tools.max_lon
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: count-earthquakes-by-criteria
      description: Count the number of earthquakes matching specified criteria without retrieving full event data. Useful
        for trend analysis and statistical queries.
      hints:
        readOnly: true
        openWorld: true
      call: usgs-earthquake.count-earthquakes
      with:
        starttime: tools.start_time
        endtime: tools.end_time
        minmagnitude: tools.min_magnitude
      outputParameters:
      - type: object
        mapping: $.
    - name: find-water-monitoring-sites
      description: Locate USGS stream gages, groundwater monitoring wells, and other water quality monitoring stations by
        state, watershed (HUC), or geographic bounding box.
      hints:
        readOnly: true
        openWorld: true
      call: usgs-water.get-monitoring-locations
      with:
        bbox: tools.bbox
        stateCd: tools.state_code
        huc: tools.huc
        siteType: tools.site_type
      outputParameters:
      - type: object
        mapping: $.
    - name: get-water-monitoring-site
      description: 'Retrieve details for a specific USGS water monitoring site using its identifier (format: USGS-SITENUMBER,
        e.g., USGS-11169025).'
      hints:
        readOnly: true
        openWorld: false
      call: usgs-water.get-monitoring-location
      with:
        featureId: tools.site_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-streamflow-data
      description: Retrieve streamflow (discharge in ft³/s) time series from a USGS stream gage. Specify parameter code 00060
        for discharge, 00065 for gage height, or other USGS parameter codes.
      hints:
        readOnly: true
        openWorld: true
      call: usgs-water.get-time-series
      with:
        monitoringLocationIdentifier: tools.site_id
        observedPropertyId: tools.parameter_id
        time: tools.time_range
      outputParameters:
      - type: object
        mapping: $.
    - name: get-groundwater-levels
      description: Retrieve groundwater level (depth to water table) observations from USGS groundwater monitoring wells.
        Use parameter code 72019 for depth to water below land surface.
      hints:
        readOnly: true
        openWorld: true
      call: usgs-water.get-time-series
      with:
        monitoringLocationIdentifier: tools.well_id
        observedPropertyId: tools.parameter_id
        time: tools.time_range
      outputParameters:
      - type: object
        mapping: $.
    - name: list-earthquake-catalogs
      description: List all available USGS earthquake catalog sources used to filter earthquake queries.
      hints:
        readOnly: true
        openWorld: false
      call: usgs-earthquake.list-catalogs
      outputParameters:
      - type: object
        mapping: $.
