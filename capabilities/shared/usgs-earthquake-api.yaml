naftiko: "1.0.0-alpha1"

info:
  label: "USGS Earthquake API"
  description: >-
    The USGS FDSN Event Web Service provides real-time and historical earthquake
    data from the ANSS ComCat catalog. Supports filtering by geography, time,
    magnitude, depth, and event type with responses in GeoJSON, CSV, KML, and
    QuakeML formats.
  tags:
    - USGS
    - Earthquake
    - Seismic
    - Geoscience
    - Federal Government
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys: {}

capability:
  consumes:
    - type: http
      namespace: usgs-earthquake
      baseUri: https://earthquake.usgs.gov/fdsnws/event/1
      description: "USGS FDSN earthquake event web service."
      resources:
        - name: earthquake-events
          path: /query
          description: "Query earthquake events from the USGS ComCat catalog."
          operations:
            - name: query-earthquakes
              method: GET
              description: "Search earthquake events by time, location, magnitude, and depth."
              inputParameters:
                - name: format
                  in: query
                  type: string
                  required: false
                  description: "Response format (geojson, csv, kml, quakeml)."
                - name: starttime
                  in: query
                  type: string
                  required: false
                  description: "Start time in ISO8601 format."
                - name: endtime
                  in: query
                  type: string
                  required: false
                  description: "End time in ISO8601 format."
                - name: minmagnitude
                  in: query
                  type: number
                  required: false
                  description: "Minimum earthquake magnitude."
                - name: maxmagnitude
                  in: query
                  type: number
                  required: false
                  description: "Maximum earthquake magnitude."
                - name: minlatitude
                  in: query
                  type: number
                  required: false
                  description: "Minimum latitude for bounding box."
                - name: maxlatitude
                  in: query
                  type: number
                  required: false
                  description: "Maximum latitude for bounding box."
                - name: minlongitude
                  in: query
                  type: number
                  required: false
                  description: "Minimum longitude for bounding box."
                - name: maxlongitude
                  in: query
                  type: number
                  required: false
                  description: "Maximum longitude for bounding box."
                - name: latitude
                  in: query
                  type: number
                  required: false
                  description: "Center latitude for circle filter."
                - name: longitude
                  in: query
                  type: number
                  required: false
                  description: "Center longitude for circle filter."
                - name: maxradiuskm
                  in: query
                  type: number
                  required: false
                  description: "Search radius in kilometers."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of events (1-20000)."
                - name: orderby
                  in: query
                  type: string
                  required: false
                  description: "Sort order (time, magnitude, etc.)."
                - name: alertlevel
                  in: query
                  type: string
                  required: false
                  description: "PAGER alert level filter."
                - name: reviewstatus
                  in: query
                  type: string
                  required: false
                  description: "Filter by review status."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: count-earthquakes
              method: GET
              description: "Count earthquake events matching query parameters."
              inputParameters:
                - name: starttime
                  in: query
                  type: string
                  required: false
                  description: "Start time in ISO8601 format."
                - name: endtime
                  in: query
                  type: string
                  required: false
                  description: "End time in ISO8601 format."
                - name: minmagnitude
                  in: query
                  type: number
                  required: false
                  description: "Minimum magnitude."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: earthquake-catalogs
          path: /catalogs
          description: "List available earthquake catalog sources."
          operations:
            - name: list-catalogs
              method: GET
              description: "Return available earthquake catalog identifiers."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: usgs-earthquake-rest
      resources:
        - path: /v1/earthquakes
          name: earthquakes
          operations:
            - method: GET
              name: query-earthquakes
              description: "Search USGS earthquake catalog."
              call: "usgs-earthquake.query-earthquakes"
              with:
                starttime: "rest.starttime"
                endtime: "rest.endtime"
                minmagnitude: "rest.minmagnitude"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: usgs-earthquake-mcp
      transport: http
      tools:
        - name: query-earthquakes
          description: "Search USGS earthquake catalog by location, time, and magnitude."
          hints:
            readOnly: true
            openWorld: true
          call: "usgs-earthquake.query-earthquakes"
          with:
            starttime: "tools.start_time"
            endtime: "tools.end_time"
            minmagnitude: "tools.min_magnitude"
            maxmagnitude: "tools.max_magnitude"
            minlatitude: "tools.min_lat"
            maxlatitude: "tools.max_lat"
            minlongitude: "tools.min_lon"
            maxlongitude: "tools.max_lon"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."

        - name: count-earthquakes
          description: "Count earthquake events matching a query without returning full data."
          hints:
            readOnly: true
            openWorld: true
          call: "usgs-earthquake.count-earthquakes"
          with:
            starttime: "tools.start_time"
            endtime: "tools.end_time"
            minmagnitude: "tools.min_magnitude"
          outputParameters:
            - type: object
              mapping: "$."
